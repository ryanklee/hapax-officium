target-version = "py312"
line-length = 100

[lint]
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "TCH",   # flake8-type-checking
]
ignore = [
    "E402",  # import not at top (langfuse try/except pattern)
    "E501",  # line too long (handled by formatter)
    "E741",  # ambiguous variable name (single-letter vars in comprehensions)
    "SIM105", # contextlib.suppress (try/except/pass is clearer for imports)
    "SIM108", # ternary operator (readability preference)
]

[lint.per-file-ignores]
"demo/**" = ["SIM115", "B023", "TCH", "TC001", "TC003"]  # Vendored from hapax-constitution

[lint.isort]
known-first-party = ["agents", "shared", "logos"]

[format]
quote-style = "double"
