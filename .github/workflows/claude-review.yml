name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.head.ref, '[auto-fix]') &&
      !contains(github.event.head_commit.message || '', '[auto-fix]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@c3d45e8e941e1b2ad7b278c57482d9c5bf1f35b3
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          max_turns: 5
          allowed_tools: "Read,Glob,Grep,Bash"
          direct_prompt: |
            Review this PR for correctness, security, and axiom compliance.
            Focus on:
            - Logic errors, missing edge cases, race conditions
            - Security: hardcoded secrets, injection vectors, path traversal
            - Axiom compliance: single_operator, decision_support, management_safety
            - The management_safety axiom is CRITICAL: the system must NEVER generate
              feedback language, coaching recommendations, or performance evaluations
              about individual team members
            - Test coverage for new code paths
            Only report HIGH and MEDIUM findings. Be specific with file paths and line numbers.

            At the END of your review, you MUST output exactly one of these lines:
            VERDICT: APPROVE
            VERDICT: REQUEST_CHANGES

            Use APPROVE if there are no HIGH findings. Use REQUEST_CHANGES only for HIGH findings.

      - name: Generate app token
        if: always() && steps.claude.outcome == 'success' && secrets.REVIEW_APP_ID != ''
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_APP_ID }}
          private-key: ${{ secrets.REVIEW_APP_KEY }}

      - name: Submit review verdict
        if: always() && steps.claude.outcome == 'success' && secrets.REVIEW_APP_ID != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '[.[] | select(.user.login == "github-actions[bot]" or .user.type == "Bot")] | last | .body // ""')

          if echo "$COMMENTS" | grep -q "VERDICT: REQUEST_CHANGES"; then
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -X POST -f event=REQUEST_CHANGES -f body="Claude review found issues requiring changes."
          else
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -X POST -f event=APPROVE -f body="Claude review passed — no high-severity findings."
          fi
